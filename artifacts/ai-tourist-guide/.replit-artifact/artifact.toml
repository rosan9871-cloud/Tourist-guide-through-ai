kind = "web"
previewPath = "/"
title = "AI Tourist Guide"
version = "1.0.0"
id = "artifacts/ai-tourist-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25064

[services.development]
run = "pnpm --filter @workspace/ai-tourist-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-tourist-guide", "run", "build" ]
publicDir = "artifacts/ai-tourist-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25064"
BASE_PATH = "/"
